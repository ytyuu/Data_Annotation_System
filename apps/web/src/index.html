<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Annotation System</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,#eef4ff_0%,#f5f7fb_60%,#ffffff_100%)] text-slate-900 antialiased">
    <main class="mx-auto w-[min(960px,calc(100vw-32px))] py-16">
      <section class="mb-6">
        <p class="mb-2 text-sm font-bold uppercase tracking-[0.12em] text-indigo-600">Turbo Monorepo Demo</p>
        <h1 class="m-0 text-4xl font-bold leading-tight sm:text-5xl lg:text-6xl">前后端放在一个仓库里统一管理</h1>
        <p class="mt-4 max-w-2xl text-base leading-7 text-slate-600 sm:text-lg">
          这个页面会直接请求本地 API 服务，方便你在同一个仓库里同时开发前端和后端。
        </p>
      </section>

      <section class="rounded-2xl border border-slate-200/80 bg-white/90 p-6 shadow-[0_18px_60px_rgba(15,23,42,0.08)]">
        <form id="hello-form" class="grid gap-3">
          <label for="name" class="font-semibold">输入一个名字</label>
          <div class="flex flex-wrap gap-3">
            <input
              id="name"
              name="name"
              type="text"
              value="Turbo"
              autocomplete="off"
              class="min-w-0 flex-1 basis-64 rounded-xl border border-slate-300 px-4 py-3.5 text-base outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
            />
            <button
              type="submit"
              class="rounded-xl bg-indigo-600 px-5 py-3.5 font-bold text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-200"
            >
              问候一下
            </button>
          </div>
        </form>

        <div
          class="mt-5 text-sm text-slate-600 data-[kind=error]:text-red-700 data-[kind=loading]:text-amber-700 data-[kind=success]:text-green-700"
          id="status"
        >
          等待连接 API...
        </div>
        <div class="mt-2 text-lg font-semibold" id="result">点击按钮后这里会显示后端返回的消息。</div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
